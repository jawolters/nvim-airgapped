name: Update plugins

on:
  schedule:
    - cron: '0 7 1-7 * 0'   # first Sunday of the month, 08:00 CET (07:00 UTC)
  workflow_dispatch:

jobs:
  update:
    name: nix flake update
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Update flake.lock
        id: update
        run: |
          cp flake.lock flake.lock.before

          nix flake update \
            --extra-experimental-features 'nix-command flakes'

          if diff -q flake.lock.before flake.lock > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes in flake.lock, skipping release."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Diff inputs
        if: steps.update.outputs.changed == 'true'
        run: |
          echo "## Plugin / input changes" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          nix flake metadata --json \
            --extra-experimental-features 'nix-command flakes' \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for name, node in sorted(data.get('locks', {}).get('nodes', {}).items()):
              locked = node.get('locked', {})
              rev = locked.get('rev', locked.get('ref', ''))[:12]
              if rev:
                  print(f'{name:40s} {rev}')
          " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and tag release
        if: steps.update.outputs.changed == 'true'
        run: |
          VERSION="v$(date -u +%Y.%m.%d)"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add flake.lock
          git commit -m "chore: nix flake update ${VERSION}"

          git tag "${VERSION}"
          git push origin main
          git push origin "${VERSION}"
