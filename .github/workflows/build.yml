name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: 'Force release'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build AppImage (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build AppImage
        run: |
          nix build .#appimage \
            --out-link result-appimage \
            --print-build-logs \
            --extra-experimental-features 'nix-command flakes'

      - name: Prepare artifact
        id: artifact
        run: |
          # The result symlink points directly to the AppImage binary.
          APPIMAGE_SRC=$(readlink -f result-appimage)
          # Use tag name if triggered by a tag, otherwise generate a date-based version
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="v$(date -u +%Y.%m.%d)"
          fi
          DEST="nvim-airgapped-${VERSION}-${{ matrix.system }}.AppImage"
          cp "$APPIMAGE_SRC" "$DEST"
          chmod +x "$DEST"

          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Record which Nix store path was used (for traceability)
          echo "nix_store_path=$APPIMAGE_SRC" >> "$GITHUB_OUTPUT"
          echo "Built from store path: $APPIMAGE_SRC"

          # Embed flake.lock hash into build summary for traceability
          LOCK_HASH=$(sha256sum flake.lock | cut -d' ' -f1)
          echo "### Build summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact | \`$DEST\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| flake.lock sha256 | \`$LOCK_HASH\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Nix store path | \`$APPIMAGE_SRC\` |" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.path }}
          path: ${{ steps.artifact.outputs.path }}
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.artifact.outputs.version }}
          name: ${{ steps.artifact.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.artifact.outputs.path }}
          prerelease: ${{ !startsWith(steps.artifact.outputs.version, 'v1') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
