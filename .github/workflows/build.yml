name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: 'Force release'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build AppImage (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            # Pull pre-built binaries from the official NixOS public cache.
            # neovim, vimPlugins.*, LSP servers are all pre-built here.
            substituters = https://cache.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-
          save: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          gc-max-store-size-linux: 8589934592   # 8 GiB
          backend: actions

      - name: Build AppImage
        run: |
          nix build .#appimage \
            --out-link result-appimage \
            --print-build-logs \
            --extra-experimental-features 'nix-command flakes'

      - name: Prepare artifact
        id: artifact
        run: |
          # The result symlink points directly to the AppImage binary.
          APPIMAGE_SRC=$(readlink -f result-appimage)
          # Use tag name if triggered by a tag, otherwise generate a date-based version
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="v$(date -u +%Y.%m.%d)"
          fi
          DEST="nvim-airgap-${VERSION}-${{ matrix.system }}.AppImage"
          cp "$APPIMAGE_SRC" "$DEST"
          chmod +x "$DEST"

          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Record which Nix store path was used (for traceability)
          echo "nix_store_path=$APPIMAGE_SRC" >> "$GITHUB_OUTPUT"
          echo "Built from store path: $APPIMAGE_SRC"

          # Embed flake.lock hash into build summary for traceability
          LOCK_HASH=$(sha256sum flake.lock | cut -d' ' -f1)
          echo "### Build summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact | \`$DEST\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| flake.lock sha256 | \`$LOCK_HASH\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Nix store path | \`$APPIMAGE_SRC\` |" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.path }}
          path: ${{ steps.artifact.outputs.path }}
          retention-days: 30

      # When triggered by a tag, use that tag. When triggered manually with
      # inputs.release=true, create (or update) a date-based tag on the fly.
      - name: Create tag for manual release
        if: inputs.release && !startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.artifact.outputs.version }}"
          git push origin "${{ steps.artifact.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.artifact.outputs.version }}
          name: ${{ steps.artifact.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.artifact.outputs.path }}
          prerelease: ${{ !startsWith(steps.artifact.outputs.version, 'v1') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
