name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: 'Force a release even without a tag'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build AppImage (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -- Install Nix ---------------------------------------------------
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            # Pull pre-built binaries from the official NixOS public cache.
            # neovim, vimPlugins.*, LSP servers are all pre-built here.
            substituters = https://cache.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      # -- Cache Nix store (GitHub Actions cache - no third-party service) --
      # nix-community/cache-nix-action stores the Nix store closure in
      # GitHub's built-in cache API.  Free, open source, no external account.
      # Key rotates on flake.lock changes so stale plugins are never reused.
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-
          # Only write the cache on main / tag builds to prevent PRs from
          # poisoning the shared cache with untrusted store paths.
          save: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          # Trim the store before saving to stay within the 10 GiB GHA limit.
          gc-enabled: true
          gc-max-store-size-linux: 8589934592   # 8 GiB

      # -- Build ---------------------------------------------------------
      # nix build .#appimage produces a symlink `result` pointing to the
      # AppImage file in the Nix store.
      - name: Build AppImage
        run: |
          nix build .#appimage \
            --out-link result-appimage \
            --print-build-logs \
            --extra-experimental-features 'nix-command flakes'

      # -- Collect artifact ----------------------------------------------
      - name: Prepare artifact
        id: artifact
        run: |
          # The result symlink points directly to the AppImage binary.
          APPIMAGE_SRC=$(readlink -f result-appimage)
          VERSION="${GITHUB_REF_NAME:-dev}"
          DEST="nvim-airgap-${VERSION}-${{ matrix.system }}.AppImage"
          cp "$APPIMAGE_SRC" "$DEST"
          chmod +x "$DEST"

          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Record which Nix store path was used (for traceability)
          echo "nix_store_path=$APPIMAGE_SRC" >> "$GITHUB_OUTPUT"
          echo "Built from store path: $APPIMAGE_SRC"

          # Embed flake.lock hash into build summary for traceability
          LOCK_HASH=$(sha256sum flake.lock | cut -d' ' -f1)
          echo "### Build summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact | \`$DEST\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| flake.lock sha256 | \`$LOCK_HASH\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Nix store path | \`$APPIMAGE_SRC\` |" >> "$GITHUB_STEP_SUMMARY"

      # -- Upload artifact (every run) -----------------------------------
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.path }}
          path: ${{ steps.artifact.outputs.path }}
          retention-days: 30

      # -- GitHub Release (tag pushes only) -----------------------------
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.artifact.outputs.version }}
          # Release notes are auto-generated from commits since last tag.
          # Replace with a CHANGELOG.md entry if you maintain one.
          generate_release_notes: true
          files: ${{ steps.artifact.outputs.path }}
          # Mark pre-releases for non-semver tags like v0.x or vYYYY.MM.DD
          prerelease: ${{ !startsWith(steps.artifact.outputs.version, 'v1') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
